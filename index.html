<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Leitor de Estoque</title>
<style>
  body { font-family: Arial, sans-serif; text-align: center; margin:0; padding:16px; background:#f4f4f4; }
  #usuarioBarra { font-size:13px; color:#555; margin-bottom:10px; }
  #usuarioBarra a { color:#0d6efd; text-decoration:none; }
  #reader { width:100%; max-width:400px; margin:0 auto; border-radius:8px; overflow:hidden; }
  #resultado { margin-top:20px; font-size:18px; padding:14px; border-radius:8px; min-height:24px; }
  .ok{background:#d4edda;color:#155724;} .erro{background:#f8d7da;color:#721c24;} .info{background:#e2e3e5;color:#383d41;}
  button { font-size:18px; padding:14px 24px; margin-top:16px; cursor:pointer; }

  #painel {
    display:none;
    max-width:400px;
    margin:16px auto 0 auto;
    background:#fff;
    border-radius:10px;
    padding:16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }
  #painel .codigo { font-size:14px; color:#666; margin-bottom:10px; }
  #painel input[type=number] {
    width:80px;
    font-size:20px;
    text-align:center;
    padding:8px;
    margin:10px 0;
  }
  #painel .botoes { display:flex; gap:10px; margin-top:10px; }
  #painel .botoes button { flex:1; font-size:16px; padding:12px; margin-top:0; }
  .btn-retirar { background:#f8d7da; border:1px solid #f1a9b0; }
  .btn-adicionar { background:#d4edda; border:1px solid #9fd6ac; }
  .btn-cancelar { background:#e2e3e5; border:1px solid #c6c8ca; margin-top:8px; width:100%; }

  #modalUsuario {
    display:none;
    position:fixed;
    top:0; left:0; right:0; bottom:0;
    background:rgba(0,0,0,0.5);
    align-items:center;
    justify-content:center;
    z-index:1000;
  }
  #modalUsuario .caixa {
    background:#fff;
    border-radius:10px;
    padding:20px;
    width:85%;
    max-width:320px;
    text-align:center;
  }
  #modalUsuario input {
    width:100%;
    font-size:18px;
    padding:10px;
    margin:14px 0;
    box-sizing:border-box;
  }
  #modalUsuario button {
    width:100%;
    margin-top:0;
  }

  #modalPin {
    display:flex;
    position:fixed;
    top:0; left:0; right:0; bottom:0;
    background:#f4f4f4;
    align-items:center;
    justify-content:center;
    z-index:2000;
  }
  #modalPin .caixa {
    background:#fff;
    border-radius:10px;
    padding:24px;
    width:85%;
    max-width:320px;
    text-align:center;
    box-shadow: 0 1px 6px rgba(0,0,0,0.15);
  }
  #modalPin input {
    width:100%;
    font-size:24px;
    text-align:center;
    letter-spacing:6px;
    padding:12px;
    margin:14px 0;
    box-sizing:border-box;
  }
  #modalPin button {
    width:100%;
    margin-top:0;
  }
  #pinErro { color:#c0392b; font-size:14px; min-height:18px; margin-top:6px; }
  #conteudoApp { display:none; }
</style>
</head>
<body>

  <div id="modalPin">
    <div class="caixa">
      <div>🔒 Digite a senha de acesso</div>
      <input type="password" id="inputPin" inputmode="numeric" placeholder="Senha">
      <button onclick="conferirPin()">Entrar</button>
      <div id="pinErro"></div>
    </div>
  </div>

  <div id="conteudoApp">
    <div id="usuarioBarra">Usuário: <b id="nomeAtual">-</b> · <a href="#" onclick="trocarUsuario(); return false;">trocar</a></div>

    <h2>📦 Leitor de Estoque</h2>
    <div id="reader"></div>
    <div id="resultado" class="info">Toque no botão para ativar a câmera</div>
    <button id="btnAtivar">📷 Ativar câmera</button>

    <div id="painel">
      <div class="codigo">Código lido: <b id="codigoLido"></b></div>
      <div>Quantidade:</div>
      <input type="number" id="quantidade" value="1" min="1">
      <div class="botoes">
        <button class="btn-retirar" onclick="enviarMovimento('saida')">➖ Retirar</button>
        <button class="btn-adicionar" onclick="enviarMovimento('entrada')">➕ Adicionar</button>
      </div>
      <button class="btn-cancelar" onclick="cancelarPainel()">Cancelar / continuar escaneando</button>
    </div>
  </div><!-- fecha #conteudoApp -->

  <div id="modalUsuario">
    <div class="caixa">
      <div>Digite seu nome:</div>
      <input type="text" id="inputNome" placeholder="Seu nome">
      <button onclick="confirmarNome()">Confirmar</button>
    </div>
  </div>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script>
    // ⚠️ Troque pela URL do SEU Web App (terminando em /exec)
    const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbwRnoIjSSc_naWngA7GyIezgqaGOsXtvpZL3UtZjujRAHNQpCyIzn84cj1bLaJWEEx7/exec";

    const SENHA_CORRETA = "1924";

    function conferirPin() {
      const valor = document.getElementById('inputPin').value.trim();
      if (valor === SENHA_CORRETA) {
        localStorage.setItem('pinLiberadoEstoque', 'ok');
        document.getElementById('modalPin').style.display = 'none';
        document.getElementById('conteudoApp').style.display = 'block';
        garantirUsuario();
      } else {
        document.getElementById('pinErro').innerText = 'Senha incorreta';
        document.getElementById('inputPin').value = '';
      }
    }

    if (localStorage.getItem('pinLiberadoEstoque') === 'ok') {
      document.getElementById('modalPin').style.display = 'none';
      document.getElementById('conteudoApp').style.display = 'block';
    }

    let nomeUsuario = localStorage.getItem('nomeUsuarioEstoque') || '';
    let processando = false;
    let codigoAtual = null;
    const scanner = new Html5Qrcode("reader");

    function garantirUsuario() {
      document.getElementById('nomeAtual').innerText = nomeUsuario || '-';
      if (!nomeUsuario) {
        abrirModalUsuario();
      }
    }

    function trocarUsuario() {
      abrirModalUsuario();
    }

    function abrirModalUsuario() {
      document.getElementById('inputNome').value = nomeUsuario || '';
      document.getElementById('modalUsuario').style.display = 'flex';
    }

    function confirmarNome() {
      const valor = document.getElementById('inputNome').value.trim();
      if (valor) {
        nomeUsuario = valor;
        localStorage.setItem('nomeUsuarioEstoque', nomeUsuario);
        document.getElementById('nomeAtual').innerText = nomeUsuario;
        document.getElementById('modalUsuario').style.display = 'none';
      }
    }

    if (localStorage.getItem('pinLiberadoEstoque') === 'ok') {
      garantirUsuario();
    }

    function tocarBipe() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
        osc.start();
        osc.stop(ctx.currentTime + 0.15);
      } catch (e) {}
    }

    document.getElementById('btnAtivar').addEventListener('click', () => {
      if (!nomeUsuario) { abrirModalUsuario(); return; }
      document.getElementById('resultado').innerText = 'Solicitando câmera...';
      scanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        aoLer
      ).then(() => {
        document.getElementById('btnAtivar').style.display = 'none';
        document.getElementById('resultado').innerText = 'Aponte para o QR code';
      }).catch(err => {
        document.getElementById('resultado').className = 'erro';
        document.getElementById('resultado').innerText = 'Erro: ' + err;
      });
    });

    function aoLer(codigo) {
      if (processando) return;
      processando = true;
      codigoAtual = codigo;

      tocarBipe();

      scanner.pause(true);
      document.getElementById('codigoLido').innerText = codigo;
      document.getElementById('quantidade').value = 1;
      document.getElementById('painel').style.display = 'block';
      document.getElementById('resultado').className = 'info';
      document.getElementById('resultado').innerText = 'Escolha a ação abaixo';
    }

    function cancelarPainel() {
      document.getElementById('painel').style.display = 'none';
      document.getElementById('resultado').className = 'info';
      document.getElementById('resultado').innerText = 'Aponte para o QR code';
      processando = false;
      scanner.resume();
    }

    function enviarMovimento(tipo) {
      const quantidade = parseInt(document.getElementById('quantidade').value, 10) || 1;

      document.getElementById('painel').style.display = 'none';
      document.getElementById('resultado').className = 'info';
      document.getElementById('resultado').innerText = 'Processando...';

      fetch(URL_APPS_SCRIPT, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ codigo: codigoAtual, tipo: tipo, quantidade: quantidade, usuario: nomeUsuario })
      })
      .then(r => r.json())
      .then(res => {
        const div = document.getElementById('resultado');
        if (res.sucesso) {
          const sinal = res.tipo === 'entrada' ? '+' : '-';
          div.className = 'ok';
          div.innerText = `✔ ${res.nome} (${sinal}${res.movimentado}) — estoque atual: ${res.quantidade}`;
        } else {
          div.className = 'erro';
          div.innerText = `✘ ${res.mensagem}`;
        }
        setTimeout(() => {
          processando = false;
          scanner.resume();
        }, 2500);
      })
      .catch(err => {
        document.getElementById('resultado').className = 'erro';
        document.getElementById('resultado').innerText = 'Erro de conexão: ' + err;
        processando = false;
        scanner.resume();
      });
    }
  </script>
</body>
</html>
