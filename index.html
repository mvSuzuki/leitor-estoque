<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Leitor de Estoque</title>
<style>
  body { font-family: Arial, sans-serif; text-align: center; margin:0; padding:16px; background:#f4f4f4; }
  #usuarioBarra { font-size:13px; color:#555; margin-bottom:10px; }
  #usuarioBarra a { color:#0d6efd; text-decoration:none; }
  #reader { width:100%; max-width:400px; margin:0 auto; border-radius:8px; overflow:hidden; }
  #resultado { margin-top:20px; font-size:18px; padding:14px; border-radius:8px; min-height:24px; }
  .ok{background:#d4edda;color:#155724;} .erro{background:#f8d7da;color:#721c24;} .info{background:#e2e3e5;color:#383d41;} .alerta{background:#fff3cd;color:#856404;}
  button { font-size:18px; padding:14px 24px; margin-top:16px; cursor:pointer; }

  #painel {
    display:none;
    max-width:400px;
    margin:16px auto 0 auto;
    background:#fff;
    border-radius:10px;
    padding:16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }
  #painel .codigo { font-size:14px; color:#666; margin-bottom:10px; }
  .botoesRapidos { display:flex; gap:10px; }
  .botoesRapidos button { flex:1; font-size:17px; padding:16px 8px; margin-top:0; }
  #linkCustom { display:inline-block; margin-top:14px; font-size:14px; color:#0d6efd; text-decoration:none; }
  #areaCustom { display:none; margin-top:12px; }
  #areaCustom input[type=number] {
    width:80px;
    font-size:20px;
    text-align:center;
    padding:8px;
    margin:10px 0;
  }
  #areaCustom .botoes { display:flex; gap:10px; margin-top:6px; }
  #areaCustom .botoes button { flex:1; font-size:15px; padding:10px; margin-top:0; }
  .btn-retirar { background:#f8d7da; border:1px solid #f1a9b0; }
  .btn-adicionar { background:#d4edda; border:1px solid #9fd6ac; }
  .btn-cancelar { background:#e2e3e5; border:1px solid #c6c8ca; margin-top:14px; width:100%; }

  #modalPin {
    display:flex;
    position:fixed;
    top:0; left:0; right:0; bottom:0;
    background:#f4f4f4;
    align-items:center;
    justify-content:center;
    z-index:2000;
  }
  #modalPin .caixa {
    background:#fff;
    border-radius:10px;
    padding:24px;
    width:85%;
    max-width:320px;
    text-align:center;
    box-shadow: 0 1px 6px rgba(0,0,0,0.15);
  }
  #modalPin input {
    width:100%;
    font-size:24px;
    text-align:center;
    letter-spacing:6px;
    padding:12px;
    margin:14px 0;
    box-sizing:border-box;
  }
  #modalPin button { width:100%; margin-top:0; }
  #pinErro { color:#c0392b; font-size:14px; min-height:18px; margin-top:6px; }
  #conteudoApp { display:none; }
</style>
</head>
<body>

  <div id="modalPin">
    <div class="caixa">
      <div>🔒 Digite seu PIN</div>
      <input type="password" id="inputPin" inputmode="numeric" placeholder="PIN">
      <button onclick="conferirPin()">Entrar</button>
      <div id="pinErro"></div>
    </div>
  </div>

  <div id="conteudoApp">
    <div id="usuarioBarra">Usuário: <b id="nomeAtual">-</b> · <a href="#" onclick="trocarUsuario(); return false;">trocar</a></div>

    <h2>📦 Leitor de Estoque</h2>
    <div id="reader"></div>
    <div id="resultado" class="info">Toque no botão para ativar a câmera</div>
    <button id="btnAtivar">📷 Ativar câmera</button>

    <div id="painel">
      <div class="codigo">Código lido: <b id="codigoLido"></b></div>

      <div class="botoesRapidos">
        <button class="btn-retirar" onclick="movimentoRapido('saida')">➖ Retirar 1</button>
        <button class="btn-adicionar" onclick="movimentoRapido('entrada')">➕ Adicionar 1</button>
      </div>

      <a href="#" id="linkCustom" onclick="mostrarCustom(); return false;">Outra quantidade</a>

      <div id="areaCustom">
        <input type="number" id="quantidade" value="1" min="1">
        <div class="botoes">
          <button class="btn-retirar" onclick="enviarMovimento('saida')">➖ Retirar</button>
          <button class="btn-adicionar" onclick="enviarMovimento('entrada')">➕ Adicionar</button>
        </div>
      </div>

      <button class="btn-cancelar" onclick="cancelarPainel()">Cancelar / continuar escaneando</button>
    </div>
  </div>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script>
    // ⚠️ Troque pela URL do SEU Web App (terminando em /exec)
    const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbwRnoIjSSc_naWngA7GyIezgqaGOsXtvpZL3UtZjujRAHNQpCyIzn84cj1bLaJWEEx7/exec";

    let nomeUsuario = localStorage.getItem('nomeUsuarioEstoque') || '';
    let processando = false;
    let codigoAtual = null;
    const scanner = new Html5Qrcode("reader");

    if (nomeUsuario) {
      document.getElementById('modalPin').style.display = 'none';
      document.getElementById('conteudoApp').style.display = 'block';
      document.getElementById('nomeAtual').innerText = nomeUsuario;
    }

    function conferirPin() {
      const pin = document.getElementById('inputPin').value.trim();
      if (!pin) return;

      document.getElementById('pinErro').innerText = 'Verificando...';

      fetch(URL_APPS_SCRIPT, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ acao: 'validarPin', pin: pin })
      })
      .then(r => r.json())
      .then(res => {
        if (res.sucesso) {
          nomeUsuario = res.nome;
          localStorage.setItem('nomeUsuarioEstoque', nomeUsuario);
          document.getElementById('nomeAtual').innerText = nomeUsuario;
          document.getElementById('modalPin').style.display = 'none';
          document.getElementById('conteudoApp').style.display = 'block';
          document.getElementById('inputPin').value = '';
          document.getElementById('pinErro').innerText = '';
        } else {
          document.getElementById('pinErro').innerText = res.mensagem || 'PIN incorreto';
          document.getElementById('inputPin').value = '';
        }
      })
      .catch(err => {
        document.getElementById('pinErro').innerText = 'Erro de conexão, tente de novo.';
      });
    }

    function trocarUsuario() {
      nomeUsuario = '';
      localStorage.removeItem('nomeUsuarioEstoque');
      document.getElementById('conteudoApp').style.display = 'none';
      document.getElementById('modalPin').style.display = 'flex';
      document.getElementById('inputPin').value = '';
    }

    function tocarBipe() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
        osc.start();
        osc.stop(ctx.currentTime + 0.15);
      } catch (e) {}
    }

    document.getElementById('btnAtivar').addEventListener('click', () => {
      document.getElementById('resultado').innerText = 'Solicitando câmera...';
      scanner.start(
        { facingMode: "environment" },
        {
          fps: 20,
          qrbox: { width: 220, height: 220 },
          formatsToSupport: [ Html5QrcodeSupportedFormats.QR_CODE ],
          experimentalFeatures: { useBarCodeDetectorIfSupported: true }
        },
        aoLer
      ).then(() => {
        document.getElementById('btnAtivar').style.display = 'none';
        document.getElementById('resultado').innerText = 'Aponte para o QR code';
      }).catch(err => {
        document.getElementById('resultado').className = 'erro';
        document.getElementById('resultado').innerText = 'Erro: ' + err;
      });
    });

    function aoLer(codigo) {
      if (processando) return;
      processando = true;
      codigoAtual = codigo;

      tocarBipe();

      scanner.pause(true);
      document.getElementById('codigoLido').innerText = codigo;
      document.getElementById('quantidade').value = 1;
      document.getElementById('areaCustom').style.display = 'none';
      document.getElementById('painel').style.display = 'block';
      document.getElementById('resultado').className = 'info';
      document.getElementById('resultado').innerText = 'Escolha a ação abaixo';
    }

    function mostrarCustom() {
      document.getElementById('areaCustom').style.display = 'block';
    }

    function cancelarPainel() {
      document.getElementById('painel').style.display = 'none';
      document.getElementById('resultado').className = 'info';
      document.getElementById('resultado').innerText = 'Aponte para o QR code';
      processando = false;
      scanner.resume();
    }

    function movimentoRapido(tipo) {
      document.getElementById('quantidade').value = 1;
      enviarMovimento(tipo);
    }

    function enviarMovimento(tipo) {
      const quantidade = parseInt(document.getElementById('quantidade').value, 10) || 1;

      document.getElementById('painel').style.display = 'none';
      document.getElementById('resultado').className = 'info';
      document.getElementById('resultado').innerText = 'Processando...';

      fetch(URL_APPS_SCRIPT, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ codigo: codigoAtual, tipo: tipo, quantidade: quantidade, usuario: nomeUsuario })
      })
      .then(r => r.json())
      .then(res => {
        const div = document.getElementById('resultado');
        if (res.sucesso) {
          const sinal = res.tipo === 'entrada' ? '+' : '-';
          if (res.estoqueBaixo) {
            div.className = 'alerta';
            div.innerText = `✔ ${res.nome} (${sinal}${res.movimentado}) — estoque atual: ${res.quantidade} ⚠️ ESTOQUE BAIXO`;
          } else {
            div.className = 'ok';
            div.innerText = `✔ ${res.nome} (${sinal}${res.movimentado}) — estoque atual: ${res.quantidade}`;
          }
        } else {
          div.className = 'erro';
          div.innerText = `✘ ${res.mensagem}`;
        }
        setTimeout(() => {
          processando = false;
          scanner.resume();
        }, 1000);
      })
      .catch(err => {
        document.getElementById('resultado').className = 'erro';
        document.getElementById('resultado').innerText = 'Erro de conexão: ' + err;
        processando = false;
        scanner.resume();
      });
    }
  </script>
</body>
</html>
